apiVersion: v1
kind: Pod
metadata:
  name: readiness-http
  labels:
    app: readiness-demo
spec:
  containers:
  - name: nginx
    image: nginx:1.29.0
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-demo-svc
spec:
  selector:
    app: readiness-demo
  ports:
  - port: 80
    targetPort: 80
