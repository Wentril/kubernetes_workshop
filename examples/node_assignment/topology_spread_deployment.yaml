apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-spread
spec:
  replicas: 6
  selector:
    matchLabels:
      app: nginx-spread
  template:
    metadata:
      labels:
        app: nginx-spread
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: nginx-spread
      containers:
      - name: nginx
        image: nginx:1.29.0
